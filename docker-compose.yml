x-api-build: &api-build
  context: .
  dockerfile: apps/api/Dockerfile

x-database-environment: &database-environment
  DATABASE_URL: "postgres://${POSTGRES_USER:-cybervett}:${POSTGRES_PASSWORD:?Set a URL-safe POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-cybervett}" # ggignore: interpolation requires an external secret
  DATABASE_SSL_MODE: disable

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybervett}
      POSTGRES_USER: ${POSTGRES_USER:-cybervett}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set a URL-safe POSTGRES_PASSWORD in .env} # ggignore: interpolation requires an external secret
    expose:
      - "5432"
    volumes:
      - cybervett_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: cybervett-api:local
    build: *api-build
    command: ["node", "apps/api/dist/scripts/migrate.js"]
    environment:
      <<: *database-environment
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: cybervett-api:local
    build: *api-build
    environment:
      <<: *database-environment
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:8080}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      DEMO_MODE: "false"
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  cybervett_postgres:
