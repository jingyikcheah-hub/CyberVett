map $uri $cybervett_log_path {
  default $uri;
  ~^/invite(?:/|$) /invite/[redacted];
  ~^/api/v1/public/invitations(?:/|$) /api/v1/public/invitations/[redacted];
}

map $http_x_forwarded_for $cybervett_forwarded_for {
  "" $remote_addr;
  default $http_x_forwarded_for;
}

map $http_x_forwarded_proto $cybervett_forwarded_proto {
  default $scheme;
  "http" http;
  "https" https;
}

log_format cybervett_sanitized escape=json
  '{"time":"$time_iso8601","request_id":"$request_id","remote_address":"$remote_addr",'
  '"method":"$request_method","path":"$cybervett_log_path","status":$status,'
  '"response_bytes":$body_bytes_sent,"duration_seconds":$request_time}';

server {
  listen 80;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  client_max_body_size 1m;

  access_log /var/log/nginx/access.log cybervett_sanitized;
  error_log /dev/null;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:" always;
  add_header Cross-Origin-Opener-Policy same-origin always;
  add_header Cross-Origin-Resource-Policy same-origin always;
  add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;
  add_header Referrer-Policy no-referrer always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header X-Request-Id $request_id always;

  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://api:4000/api/;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $cybervett_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $cybervett_forwarded_proto;
    proxy_set_header X-Real-IP $cybervett_forwarded_for;
    proxy_set_header X-Request-Id $request_id;
  }

  location /health/ {
    proxy_http_version 1.1;
    proxy_pass http://api:4000/health/;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $cybervett_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $cybervett_forwarded_proto;
    proxy_set_header X-Real-IP $cybervett_forwarded_for;
    proxy_set_header X-Request-Id $request_id;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
