name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cybervett_test
          POSTGRES_USER: cybervett
          POSTGRES_PASSWORD: integration-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cybervett -d cybervett_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://cybervett:integration-only-password@127.0.0.1:5432/cybervett_test
      TEST_DATABASE_URL: postgres://cybervett:integration-only-password@127.0.0.1:5432/cybervett_test
      DATABASE_SSL_MODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspace @cybervett/contracts
      - run: npm run migrate:dev --workspace @cybervett/api
      - run: npm run test:postgres
